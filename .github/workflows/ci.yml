name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  installer-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate Bash syntax
        run: bash -n instalar.sh

      - name: Run ShellCheck
        run: shellcheck instalar.sh

      - name: Smoke-test help output
        run: ./instalar.sh --help

      - name: Run Node-based installer tests
        run: node --test tests/*.cjs
