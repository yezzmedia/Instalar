name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release metadata
        id: metadata
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const {
            readChangelogMetadata,
            readInstallerMetadata,
            readLatestChangelogSection,
            readReadmeMetadata,
          } = require("./tests/support/instalar-metadata.cjs");

          const installer = readInstallerMetadata();
          const readme = readReadmeMetadata();
          const changelog = readChangelogMetadata();

          if (process.env.GITHUB_REF_NAME !== installer.expectedTag) {
            throw new Error(
              `Tag mismatch: expected ${installer.expectedTag}, got ${process.env.GITHUB_REF_NAME}`,
            );
          }

          if (
            readme.version !== installer.version ||
            readme.codename !== installer.codename
          ) {
            throw new Error("README release metadata does not match installer metadata");
          }

          if (
            changelog.version !== installer.version ||
            changelog.codename !== installer.codename
          ) {
            throw new Error("CHANGELOG release metadata does not match installer metadata");
          }

          fs.writeFileSync("release-notes.md", readLatestChangelogSection());
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${installer.expectedTag}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `title=${installer.expectedTag}\n`);
          NODE

      - name: Create or update draft release
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES_PATH: release-notes.md
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const name = process.env.RELEASE_TITLE;
            const body = fs.readFileSync(process.env.RELEASE_NOTES_PATH, "utf8");

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const existing = releases.find((release) => release.tag_name === tag);

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name,
                body,
                draft: true,
                prerelease: false,
              });
              return;
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name,
              body,
              draft: true,
              prerelease: false,
            });
